<?php

include 'about-yourrep-shared.php';

$rep = $values['rep'];
global $va_council_child_types;
$show_mp          = (bool) in_array($rep, ['mp', 'mp-wales', 'mp-scotland', 'mp-ni']);
$show_councillor  = (bool) in_array(strtoupper($rep), $va_council_child_types);
$show_msp         = $rep == 'msp';
$show_mla         = $rep == 'mla';
$show_welsh       = $rep == 'ms';
$show_gla         = $rep == 'lam';


if ($show_councillor) {
    $specific = yourrep_md("councillor-" . strtoupper($rep) . ".md");
    if ($specific) {
        echo $specific;
    } else {
        echo yourrep_md('councillor.md');
    }
} elseif ($show_msp) {
    echo yourrep_md('msp.md');
} elseif ($show_mla) {
    echo yourrep_md('mla.md');
} elseif ($show_welsh) {
    echo yourrep_md('am.md');
} elseif ($show_gla) {
    echo yourrep_md('lam.md');
} elseif ($show_mp) {
    echo yourrep_md("$rep.md");
} ?>
